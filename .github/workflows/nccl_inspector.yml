name: Build NCCL Inspector

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Arch ${{ matrix.arch }} / cuda ${{ matrix.cuda_version }} / nccl ${{ matrix.nccl_version }}
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        arch: ['amd64', 'arm64']
        cuda_version: ['13.0.2']
        nccl_version: ['2.30.4-1']
        distribution: [ 'ubuntu24.04' ]

        include:
          - arch: 'amd64'
            platform: 'linux/amd64'
            runner: 'ubuntu-24.04'
            lib_arch: 'x86_64'
          - arch: 'arm64'
            platform: 'linux/arm64'
            runner: 'ubuntu-24.04-arm'
            lib_arch: 'aarch64'

          - cuda_version: '13.0.2'
            nccl_cuda_version: '13.0'

          - nccl_repo_owner: 'NVIDIA'
          - nccl_version_major: '2'
          - nccl_version_release: '1'
          - nccl_path_to_inspector: 'plugins/profiler/inspector'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: nccl-inspector/Dockerfile
          push: false
          tags: nccl_inspector_builder:nccl_${{ matrix.nccl_version }}_cuda_${{ matrix.cuda_version }}_${{ matrix.distribution }}_${{ matrix.nccl_version_release }}
          platforms: ${{ matrix.platform }}
          load: true
          build-args: |
            ARCH=${{ matrix.arch }}
            CUDA_VERSION=${{ matrix.cuda_version }}
            LIB_ARCH=${{ matrix.lib_arch }}
            NCCL_REPO_OWNER=${{ matrix.nccl_repo_owner }}
            NCCL_VERSION=${{ matrix.nccl_version }}
            NCCL_VERSION_MAJOR=${{ matrix.nccl_version_major }}
            NCCL_VERSION_RELEASE=${{ matrix.nccl_version_release }}
            NCCL_CUDA_VERSION=${{ matrix.nccl_cuda_version }}
            NCCL_PATH_TO_INSPECTOR=${{ matrix.nccl_path_to_inspector }}

      - name: Create output directory
        run: mkdir -p artifacts

      - name: Run Docker container and copy files
        run: |
          container_id=$(docker create nccl_inspector_builder:nccl_${{ matrix.nccl_version }}_cuda_${{ matrix.cuda_version }}_${{ matrix.distribution }}_${{ matrix.nccl_version_release }})
          docker cp ${container_id}:/artifacts/. ./artifacts/
          docker rm ${container_id}

      - name: Normalize platform for artifact names
        run: echo "PLATFORM_SAFE=${{ matrix.platform }}" | sed 's/\//-/g' >> "$GITHUB_ENV"

      - name: Upload DEB packages as artifact
        uses: actions/upload-artifact@v7
        with:
          name: debs-nccl-inspector-${{ matrix.nccl_version }}-cuda-${{ matrix.nccl_cuda_version }}-${{ matrix.distribution }}-${{ matrix.nccl_version_release }}-${{ env.PLATFORM_SAFE }}
          path: artifacts/*.deb
          if-no-files-found: error
          overwrite: 'true'
          retention-days: 7

  release:
    name: Release NCCL Inspector ${{ matrix.nccl_version }} / cuda ${{ matrix.cuda_version }}/ ${{ matrix.distribution }}
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        cuda_version: [ '13.0' ]
        nccl_version: [ '2.30.4-1' ]
        include:
          - distribution: 'ubuntu24.04'
          - nccl_repo_owner: 'NVIDIA'
          - nccl_version_release: '1'
          - nccl_path_to_inspector: 'plugins/profiler/inspector'

    concurrency:
      group: release-nccl-inspector-${{ matrix.nccl_version }}-cuda-${{ matrix.cuda_version }}-${{ matrix.distribution }}-${{ matrix.nccl_version_release }}
      cancel-in-progress: false

    steps:
      - name: Download all DEB artifacts for this version set
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: debs-nccl-inspector-${{ matrix.nccl_version }}-cuda-${{ matrix.cuda_version }}-${{ matrix.distribution }}-${{ matrix.nccl_version_release }}-*
          merge-multiple: true

      - name: Show downloaded debs
        run: |
          find artifacts -type f -name "*.deb" -print

      - name: Check if release already exists
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nccl-inspector-${{ matrix.nccl_version }}-cuda-${{ matrix.cuda_version }}-${{ matrix.distribution }}-${{ matrix.nccl_version_release }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload all DEBs
        if: steps.rel.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nccl-inspector-${{ matrix.nccl_version }}-cuda-${{ matrix.cuda_version }}-${{ matrix.distribution }}-${{ matrix.nccl_version_release }}
          name: NCCL Inspector v${{ matrix.nccl_version }}+cuda${{ matrix.cuda_version }}-${{ matrix.nccl_version_release }}_${{ matrix.distribution }}
          body: |
            [NCCL Inspector plugin](https://github.com/${{ matrix.nccl_repo_owner }}/nccl/tree/v${{ matrix.nccl_version }}/${{ matrix.nccl_path_to_inspector }})
            
            | NCCL version | CUDA version | Distribution | Deb version |
            | :--- | :--- | :---: | ---: |
            | [`${{ matrix.nccl_version }}`](https://github.com/${{ matrix.nccl_repo_owner }}/nccl/tree/v${{ matrix.nccl_version }}) | `${{ matrix.cuda_version }}` | `${{ matrix.distribution }}` | `${{ matrix.nccl_version_release }}` |
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/*.deb
